name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *" # Run automatically every 12 hours
  workflow_dispatch:
  push:
    branches:
    - master
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      # Executes the snake action to generate SVG files
      - name: Generate github-contribution-grid-snake.svg
        uses: platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          
          # Outputs both light and dark mode animations
          # We use specific colors here to create the neon-lit 'Pac-Man' high-contrast style
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00FFCC&color_dots=#0D1117,#161B22,#005B40,#00A380,#00FFCC
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Pushes the generated SVGs to the output branch
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
